<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostle Spotlight</title>

    <style>

        body {
            background-color: #E8ECED;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 1000px;
            margin: 40px auto;
            padding: 30px;

            background-image: url("images/christus.webp");
            background-size: cover;
            background-position: center;

            border: 6px solid black;
            border-radius: 35px;

            text-align: center;
            color: white;
        }

        h1 {
            font-size: 60px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 40px;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .apostle {
            width: 170px;
            height: 170px;

            border: 8px solid white;
            border-radius: 50%;

            overflow: hidden;

            transition: 0.3s;
        }

        .apostle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Hover Effect */
        .apostle:hover {
            border-color: gold;
            transform: scale(1.05);
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>First Presidency</h1>

        <div class="row">
            <div class="apostle">
                <img src="images/eyring.webp" alt="Eyring">
            </div>

            <div class="apostle">
                <img src="images/oaks.webp" alt="Oaks">
            </div>

            <div class="apostle">
                <img src="images/christofferson.webp" alt="Christofferson">
            </div>
        </div>

        <h2>Quorum of the Twelve Apostles</h2>

        <div class="row">
            <div class="apostle">
                <img src="images/uchtdorf.webp" alt="">
            </div>

            <div class="apostle">
                <img src="images/bednar.webp" alt="">
            </div>

            <div class="apostle">
                <img src="images/cook.webp" alt="">
            </div>

            <div class="apostle">
                <img src="images/anderson.webp" alt="">
            </div>
        </div>

        <div class="row">
            <div class="apostle">
                <img src="images/rasband.webp" alt="">
            </div>

            <div class="apostle">
                <img src="images/stevenson.webp" alt="">
            </div>

            <div class="apostle">
                <img src="images/renlund.webp" alt="">
            </div>

            <div class="apostle">
                <img src="images/gong.webp" alt="">
            </div>
        </div>

        <div class="row">
            <div class="apostle">
                <img src="images/soares.webp" alt="">
            </div>

            <div class="apostle">
                <img src="images/kearon.webp" alt="">
            </div>

            <div class="apostle">
                <img src="images/causse.webp" alt="">
            </div>

            <div class="apostle">
                <img src="images/gilbert.webp" alt="">
            </div>
        </div>

    </div>

</body>
</html>
