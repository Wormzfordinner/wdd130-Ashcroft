<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background: rgb(120, 96, 64);
            display: flex;
            justify-content: center;
            padding: 20px;
            font-family: Georgia, serif;
        }

        #formContainer {
            width: 410px;
            border: 10px solid #0d2f8b;
            border-radius: 30px;
            overflow: hidden;
            background: white;
            position: relative;
        }

        .hero {
            height: 170px;
            background-image: url("images/jesus_feeds_5000.jpeg");
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .hero h1 {
            color: white;
            text-align: center;
            position: absolute;
            width: 100%;
            top: 45px;
            text-shadow: 3px 3px 5px black;
            font-size: 3rem;
        }

        .hero span {
            display: block;
            font-size: 1.3rem;
        }

        #closeBtn {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            padding: 3px 8px;
            cursor: pointer;
        }

        #formContainer>h3 {
            text-align: center;
            margin: 20px 0;
        }

        #myForm {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 18px 15px;
            padding: 0 20px 20px;
            align-items: center;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 5px;
        }

        .full-width {
            grid-column: 1 / 3;
            text-align: center;
        }

        .submit-row {
            grid-column: 1 / 3;
            text-align: center;
        }

        button[type="submit"] {
            padding: 5px 12px;
        }

        .scriptures {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
        }

        .scriptures img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-right: 2px solid white;
        }

        .scriptures img:last-child {
            border-right: none;
        }

        #output {
            margin-top: 20px;
            color: white;
            text-align: center;
        }
    </style>

</head>

<body>

    <div id="formContainer">

        <header class="hero">
            <button type="button" id="closeBtn">X</button>

            <h1>
                Daily Feed
                <span>Scripture a Day</span>
            </h1>
        </header>

        <h3>Sign Up for Daily Scripture Feed</h3>

        <form id="myForm">

            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section class="full-width">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section class="full-width">
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">
                    I acknowledge the terms and conditions
                </label>
            </section>

            <section class="submit-row">
                <button type="submit">Submit</button>
            </section>

        </form>

        <div class="scriptures">
            <img src="images/old_testament.webp" alt="Old Testament">
            <img src="images/new_testament.webp" alt="New Testament">
            <img src="images/book_of_mormon.webp" alt="Book of Mormon">
            <img src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants">
            <img src="images/pearl_of_great_price.webp" alt="Pearl of Great Price">
        </div>

    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
        });

        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault();

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
        });
    </script>

</body>

</html>
