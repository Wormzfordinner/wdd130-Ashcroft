<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- TABLE -->

<table>
  <thead>
    <tr>
      <th>Speaker</th>
      <th>Title</th>
      <th>Location</th>
      <th>Year</th>
    </tr>
  </thead>

  <tbody>
    <tr>
      <td>Jeffrey R. Holland</td>
      <td>Cast Not Away Therefore Your Confidence</td>
      <td>BYU</td>
      <td>1999</td>
    </tr>

    <tr>
      <td>Dieter F. Uchtdorf</td>
      <td>Your Great Adventure</td>
      <td>BYU</td>
      <td>2019</td>
    </tr>

    <tr>
      <td>David A. Bednar</td>
      <td>Things as They Really Are</td>
      <td>BYU-Idaho</td>
      <td>2009</td>
    </tr>
  </tbody>
</table>

<!-- FORM -->

<form>
  <h2>Add a New Devotional</h2>

  <label for="speaker">Speaker</label>
  <input type="text" id="speaker" name="speaker">

  <label for="title">Title</label>
  <input type="text" id="title" name="title">

  <label for="location">Location</label>
  <input type="text" id="location" name="location">

  <label for="year">Year</label>
  <input type="number" id="year" name="year">

  <button type="submit">Submit</button>
</form>
      </div>
    </main>
  </div>
</body>
</html>
