<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dallin H Oaks</title>

    <style>
        /* General body styling */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #FFECD7;
            font-family: Arial, sans-serif;
        }

        /* Card styling */
        .card {
            background: #008db1;
            width: fit-content;
            padding: 20px;
            border-radius: 12px;
            border: 3px solid #004363;
            text-align: center;
        }

        /* Heading styling */
        .card h1 {
            font-family: Helvetica, Arial, sans-serif;
            color: #FFFFFF;
            margin-bottom: 5px;
        }

        /* Link styling */
        .card a {
            text-decoration: none;
            color: #91e4fb;
        }

        /* Paragraph spacing */
        .card p {
            margin-top: 5px;
            margin-bottom: 10px;
        }

        /* Image styling */
        .card img {
    max-width: 100%;
    max-height: 250px;
    height: auto;
    object-fit: cover;
    border: 3px solid white;
    border-radius: 8px;
}

        /* List styling */
        .card ul {
            margin-top: 3px;
            padding-left: 20px;
            list-style-position: outside;
            text-align: left;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        /* Quote styling */
        .card .quote {
            color: #FFD783;
            font-family: "Brush Script MT", "Nanum Brush Script", cursive;
            font-size: 1.2em;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Dallin H Oaks</h1>

        <p>
            <a href="https://www.churchofjesuschrist.org/learn/dallin-h-oaks" target="_blank">
                18th President of the Church of Jesus <br>
                Christ of Latter-day Saints
            </a>
        </p>

        <img src="images/oaks.jpg" alt="Dallin H Oaks">
            <li>Born: Aug 12, 1932</li>
            <li>Apostle: Apr 7, 1984</li>
            <li>Prophet: Oct 14, 2025</li>
        </ul>

        <p class="quote">"You can never get enough of what you don't need, because what you don't need won't satisfy you."</p>
    </div>
</body>
</html>
